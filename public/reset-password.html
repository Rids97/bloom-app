<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Bloom AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0d0f0b; --surface: #13160f; --border: #2a2e24; --accent: #a8c97f; --accent-dim: #6b8f4a; --text: #e8ead4; --text-muted: #7a8066; --error: #c97f7f; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; }
    body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 60% 50% at 20% 80%, rgba(168,201,127,0.07) 0%, transparent 60%); pointer-events: none; }
    .container { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .card { width: 100%; max-width: 400px; background: var(--surface); border: 1px solid var(--border); padding: 48px 44px; position: relative; animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both; }
    .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity: 0.6; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
    .logo-icon { width: 28px; height: 28px; border: 1.5px solid var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .logo-icon::after { content: ''; width: 8px; height: 8px; background: var(--accent); border-radius: 50%; }
    .logo-text { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 300; letter-spacing: 0.12em; }
    h1 { font-family: 'Cormorant Garamond', serif; font-size: 30px; font-weight: 300; font-style: italic; margin-bottom: 6px; }
    .subtitle { font-size: 11px; color: var(--text-muted); letter-spacing: 0.08em; margin-bottom: 28px; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 10px; letter-spacing: 0.12em; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; }
    input { width: 100%; background: transparent; border: 1px solid var(--border); color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; padding: 12px 14px; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: var(--accent-dim); }
    input::placeholder { color: var(--text-muted); opacity: 0.5; }
    .btn { width: 100%; margin-top: 6px; padding: 14px; background: var(--accent); color: var(--bg); border: none; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; }
    .btn:hover { background: #bde090; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg { margin-top: 12px; font-size: 11px; letter-spacing: 0.04em; min-height: 16px; text-align: center; color: var(--text-muted); }
    .msg.error { color: var(--error); }
    .msg.success { color: var(--accent); }
    .back-link { display: block; text-align: center; margin-top: 16px; font-size: 10px; color: var(--text-muted); cursor: pointer; text-decoration: none; letter-spacing: 0.06em; }
    .back-link:hover { color: var(--accent); }
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="logo"><div class="logo-icon"></div><span class="logo-text">BLOOM AI</span></div>
    <h1>New<br/>password.</h1>
    <p class="subtitle">SET A NEW PASSWORD FOR YOUR ACCOUNT</p>
    <div id="form-section">
      <div class="field"><label>New password (min 8 characters)</label><input type="password" id="new-password" placeholder="••••••••" /></div>
      <div class="field"><label>Confirm new password</label><input type="password" id="confirm-password" placeholder="••••••••" onkeydown="if(event.key==='Enter') resetPassword()" /></div>
      <button class="btn" id="reset-btn" onclick="resetPassword()">SET NEW PASSWORD →</button>
      <p class="msg" id="reset-msg"></p>
    </div>
    <a href="/login" class="back-link">← Back to sign in</a>
  </div>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  const email = params.get('email');

  if (!token || !email) {
    document.getElementById('reset-msg').textContent = 'Invalid reset link. Please request a new one.';
    document.getElementById('reset-msg').className = 'msg error';
    document.getElementById('form-section').style.display = 'none';
  }

  async function resetPassword() {
    const newPassword = document.getElementById('new-password').value;
    const confirmPassword = document.getElementById('confirm-password').value;
    const btn = document.getElementById('reset-btn');
    const msgEl = document.getElementById('reset-msg');

    if (!newPassword || newPassword.length < 8) {
      msgEl.textContent = 'Password must be at least 8 characters.';
      msgEl.className = 'msg error'; return;
    }
    if (newPassword !== confirmPassword) {
      msgEl.textContent = 'Passwords do not match.';
      msgEl.className = 'msg error'; return;
    }

    btn.disabled = true;
    msgEl.textContent = 'Resetting…';
    msgEl.className = 'msg';

    try {
      const res = await fetch('/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, token, newPassword }),
      });
      const data = await res.json();
      if (res.ok) {
        msgEl.textContent = data.message || 'Password reset! Redirecting to sign in…';
        msgEl.className = 'msg success';
        setTimeout(() => window.location = '/login', 2000);
      } else {
        msgEl.textContent = data.error || 'Reset failed.';
        msgEl.className = 'msg error';
      }
    } catch {
      msgEl.textContent = 'Something went wrong. Try again.';
      msgEl.className = 'msg error';
    } finally {
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
